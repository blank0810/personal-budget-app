services:
    app:
        container_name: budget-planner-app
        build:
            context: .
            dockerfile: docker/Dockerfile
        restart: on-failure
        environment:
            # Internal connection to postgres service on port 5432
            DATABASE_URL: ${DATABASE_URL}
            NEXTAUTH_URL: ${NEXTAUTH_URL}
            NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASS: ${SMTP_PASS}
            NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
            REDIS_URL: redis://redis:6379
            CRON_SECRET: ${CRON_SECRET}
            BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN}
            SMS_API_KEY: ${SMS_API_KEY}
            SMS_API_URL: ${SMS_API_URL}
            SMS_USER_ID: ${SMS_USER_ID}
        ports:
            - '3000:3000'
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - budget-network
        volumes:
            - ./:/app

    redis:
        image: redis:7-alpine
        container_name: budget-planner-redis
        restart: on-failure
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        networks:
            - budget-network

    db:
        image: postgres:16-alpine
        container_name: budget-planner-db
        restart: on-failure
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '5433:5432' # Mapped to 5433 to avoid conflict with repsshield-db
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - budget-network

    bull-board:
        image: deadly0/bull-board
        container_name: budget-planner-bull-board
        restart: on-failure
        environment:
            REDIS_HOST: redis
            REDIS_PORT: 6379
        ports:
            - '3002:3000'
        depends_on:
            redis:
                condition: service_started
        networks:
            - budget-network

    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: budget-planner-pgadmin
        restart: on-failure
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@budget-app.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - '5051:80' # Mapped to 5051 to avoid conflict with repsshield pgadmin
        depends_on:
            db:
                condition: service_healthy
        networks:
            - budget-network
        volumes:
            - pgadmin_data:/var/lib/pgadmin

networks:
    budget-network:
        driver: bridge

volumes:
    postgres_data:
    pgadmin_data:
    redis_data:
